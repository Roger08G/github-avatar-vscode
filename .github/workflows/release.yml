name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.14

            - name: Install dependencies
              run: bun ci

            - name: Validate
              run: bun run check

            - name: Package VSIX
              run: bun run package:vsix

            - name: Create GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh release create "$GITHUB_REF_NAME" ./*.vsix --generate-notes --verify-tag
